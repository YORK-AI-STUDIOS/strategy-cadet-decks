<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Strategy Cadet — Deck Hosting</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e1116;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      max-width: 560px;
      padding: 48px;
      text-align: center;
    }
    h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.01em; }
    .tag { color: #7d8590; font-size: 14px; margin-bottom: 28px; }
    p { color: #adbac7; line-height: 1.6; font-size: 15px; }
    .decks { text-align: left; margin-top: 24px; }
    .decks h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: #7d8590; }
    .empty { color: #6e7681; font-style: italic; font-size: 14px; }
    code { background: #1c2128; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Strategy Cadet</h1>
    <div class="tag">Deck hosting &middot; testing phase</div>
    <p>This site hosts Strategy Cadet HTML presentations for collaborator review during the testing phase.</p>
    <div class="decks">
      <h2>Available decks</h2>
      <p class="empty">No decks published yet.</p>
    </div>
    <p style="margin-top:28px;font-size:13px;color:#6e7681;">
      Decks are added as <code>/&lt;deck-name&gt;/index.html</code> and served at
      <code>/&lt;deck-name&gt;/</code>.
    </p>
  </div>
</body>
</html>
