<style>
  :root {
    --bg: #0e1116;
    --panel: #1a1f2b;
    --label: #e6edf3;
    --sub: #7d8590;
    --accent: #539bf5;
    --border: #232a36;
    --gap: 28px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--label); font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  .topbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 18px;
    padding: 12px 24px;
    background: rgba(14,17,22,0.94);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }
  .topbar h1 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .topbar .meta { color: var(--sub); font-size: 13px; }
  .topbar .spacer { flex: 1; }
  .topbar select {
    background: #1c2128; color: var(--label);
    border: 1px solid #30363d; padding: 7px 12px;
    border-radius: 6px; font-size: 13px;
    min-width: 320px; cursor: pointer;
  }
  .topbar select:focus { outline: none; border-color: var(--accent); }

  .deck { padding: 24px; display: flex; flex-direction: column; gap: var(--gap); max-width: 1600px; margin: 0 auto; }
  .slide-row { display: flex; flex-direction: column; gap: 8px; scroll-margin-top: 72px; }
  .slide-label {
    display: flex; gap: 14px; align-items: baseline;
    padding: 0 6px;
  }
  .slide-label .num { font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; min-width: 28px; }
  .slide-label .name { color: var(--label); font-weight: 500; }
  .slide-label .file { color: var(--sub); margin-left: auto; font-family: ui-monospace, Menlo, monospace; font-size: 11px; }

  .frame {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border: 1px solid #232a36;
    overflow: hidden;
    border-radius: 4px;
  }
  .frame iframe {
    position: absolute; top: 0; left: 0;
    width: 1920px; height: 1080px;
    border: 0;
    transform-origin: top left;
  }

  .footer {
    padding: 32px 24px 48px;
    color: var(--sub);
    text-align: center;
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 24px;
  }
</style>
</head>

<!-- password gate -->
<div id="pw-gate">
  <div class="pw-box">
    <div class="pw-logo">Strategy Cadet</div>
    <div class="pw-sub">This presentation is password protected</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off" autofocus>
    <button id="pw-go">Unlock</button>
    <div id="pw-err"></div>
  </div>
</div>
<style>
#pw-gate{position:fixed;inset:0;z-index:99999;background:#0e1116;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
#pw-gate .pw-box{text-align:center;padding:48px;max-width:380px;width:100%;box-sizing:border-box;}
#pw-gate .pw-logo{color:#e6edf3;font-size:24px;font-weight:700;letter-spacing:-0.01em;margin-bottom:8px;}
#pw-gate .pw-sub{color:#7d8590;font-size:14px;margin-bottom:28px;}
#pw-gate input{width:100%;box-sizing:border-box;padding:12px 14px;border-radius:8px;border:1px solid #30363d;background:#1c2128;color:#e6edf3;font-size:15px;outline:none;}
#pw-gate input:focus{border-color:#539bf5;}
#pw-gate button{margin-top:12px;width:100%;padding:12px;border-radius:8px;border:none;background:#539bf5;color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
#pw-gate button:hover{background:#4288e0;}
#pw-gate #pw-err{color:#f85149;font-size:13px;margin-top:12px;min-height:18px;}
</style>
<script>
(function(){
  var HASH='2b8d70ae423705ba45b06aa80ad1c4996ebb358053f7678e91fe15eaba05af38';
  var KEY='sc-deck-unlocked-v1';
  var gate=document.getElementById('pw-gate');
  if(localStorage.getItem(KEY)==='yes'){gate.parentNode.removeChild(gate);return;}
  document.documentElement.style.overflow='hidden';
  async function check(){
    var v=document.getElementById('pw-input').value;
    var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
    var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    if(hex===HASH){localStorage.setItem(KEY,'yes');document.documentElement.style.overflow='';gate.parentNode.removeChild(gate);}
    else{document.getElementById('pw-err').textContent='Incorrect password';document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();}
  }
  document.getElementById('pw-go').addEventListener('click',check);
  document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')check();});
})();
</script>

  row.className = "slide-row";
  row.id = "s" + num;
  row.innerHTML = `
    <div class="slide-label">
      <span class="num">${num}</span>
      <span class="name">${name}</span>
      <span class="file">${file}</span>
    </div>

  deck.appendChild(row);

  const opt = document.createElement("option");
  opt.value = "s" + num;
  opt.textContent = `${num}, ${name}`;
  jump.appendChild(opt);
});

function scaleFrames() {
  document.querySelectorAll(".frame").forEach(f => {
    const iframe = f.querySelector("iframe");
    const w = f.clientWidth;
    const scale = w / 1920;
    iframe.style.transform = `scale(${scale})`;
  });
}
window.addEventListener("resize", scaleFrames);
window.addEventListener("load", scaleFrames);
document.querySelectorAll("iframe").forEach(i => i.addEventListener("load", scaleFrames));

jump.addEventListener("change", e => {
  const id = e.target.value;
  if (id) document.getElementById(id).scrollIntoView({ behavior: "smooth", block: "start" });
  e.target.value = "";
});
