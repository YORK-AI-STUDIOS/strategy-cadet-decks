<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Report Viewer</title>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #131313;
  --surface-2: #1a1a1a;
  --surface-hover: #222;
  --border: #242424;
  --border-strong: #333;
  --text: #f0f0f0;
  --text-muted: #8a8a8a;
  --text-dim: #555;
  --accent: #5b9eff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ============ TOP BAR ============ */
.topbar {
  height: 48px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: var(--surface);
  flex-shrink: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  position: relative;
}
.topbar-left, .topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 1;
}
.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
  line-height: 1;
  margin-top: 10px;
}
.brand-logo {
  height: 28px;
  width: auto;
  display: block;
  mix-blend-mode: screen;
}
.topbar .version {
  color: var(--text-dim);
  font-size: 7px;
  letter-spacing: 0.4px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-top: 2px;
  margin-left: 2px;
}
.topbar-center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  transition: left 0.18s ease;
}
/* On Index and Cadet views, the 240px index panel is on the right,
   so shift the pill to the centre of the slide area: 50% - (240/2) = 50% - 120px */
.app[data-view="index"] .topbar-center,
.app[data-view="cadet"] .topbar-center {
  left: calc(50% - 120px);
}
.context-pill {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 5px 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11.5px;
  letter-spacing: 0.3px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}
.ctx-item { white-space: nowrap; }
.ctx-label {
  color: var(--text-muted);
  font-weight: 400;
}
.ctx-value {
  color: var(--text);
  font-weight: 500;
}
.ctx-divider {
  width: 1px;
  height: 12px;
  background: var(--border-strong);
  display: inline-block;
}
.topbar .date {
  color: var(--text-muted);
  font-weight: 400;
  font-size: 11.5px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.3px;
}
.topbar .copyright {
  color: var(--text-dim);
  font-size: 9.5px;
  letter-spacing: 0.3px;
}
.topbar .title-sep {
  color: var(--text-dim);
  font-size: 10px;
}
.topbar .title-sep.dim {
  color: #333;
}

/* ============ PRESENT MODE CHROME ============ */
.app[data-view="present"] .topbar { display: none; }
.app[data-view="present"] .controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  transform: translateY(100%);
  transition: transform 0.25s ease;
  z-index: 200;
  background: rgba(19, 19, 19, 0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
}
.app[data-view="present"][data-present-ui="show"] .controls {
  transform: translateY(0);
}

/* ============ VIEWPORT ============ */
.viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}

/* Slide frame, used in every view */
.slide-frame {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 5px;
  padding: 7px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 12px 40px rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.3);
}

.slide {
  aspect-ratio: 16/9;
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 5%;
  color: white;
  position: relative;
  overflow: hidden;
}

/* ===== FULL VIEW ===== */
.view-present {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  background: #000;
  height: 100%;
}
.view-present .slide-frame {
  width: min(100vw, calc(100vh * 16 / 9));
  border: none;
  background: transparent;
  padding: 0;
  border-radius: 0;
  box-shadow: none;
}

/* ===== GRID VIEW ===== */
.view-grid {
  overflow-y: auto;
  padding: 28px 32px;
}
.grid-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  max-width: 1500px;
  margin: 0 auto;
}
.grid-item {
  cursor: pointer;
  transition: transform 0.15s ease;
}
.grid-item:hover { transform: translateY(-2px); }
.grid-item:hover .slide-frame { border-color: #3a3a3a; }
.grid-item.active .slide-frame {
  border-color: var(--accent);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 0 0 1px var(--accent),
    0 12px 40px rgba(0,0,0,0.5);
}
.grid-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
  padding: 0 2px;
  display: flex;
  gap: 6px;
}
.grid-label .num {
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

/* ===== SHARED PIECES (used by Index and Cadet views) ===== */
.slide-area {
  padding: 8px;
  display: grid;
  place-items: center;
  overflow: hidden;
  min-width: 0;
  min-height: 0;
}
.slide-area .slide-frame {
  width: max-content;
  max-width: 100%;
  max-height: 100%;
}
.index-panel {
  border-left: 1px solid var(--border);
  background: var(--surface);
  overflow-y: auto;
  box-shadow: inset 1px 0 0 rgba(255,255,255,0.02);
}

/* ===== INDEX VIEW (slide + index, no chat) ===== */
.view-index {
  display: grid;
  grid-template-columns: 1fr 240px;
  grid-template-rows: 1fr;
  height: 100%;
}
.view-index .slide-area { grid-column: 1; grid-row: 1; }
.view-index .index-panel { grid-column: 2; grid-row: 1; }
.view-index .slide-area .slide {
  /* No chat row. Subtract:
     width: 240 (index) + 16 (slide-area padding) + 16 (frame overhead) = 272
     height: 48 (topbar) + 56 (controls) + 16 (slide-area padding) + 16 (frame overhead) = 136 */
  width: min(
    calc(100vw - 272px),
    calc((100vh - 136px) * 16 / 9)
  );
}

/* ===== CADET VIEW (slide + index + chat) ===== */
.view-cadet {
  display: grid;
  grid-template-columns: 1fr 240px;
  grid-template-rows: 1fr 160px;
  height: 100%;
}
.view-cadet .slide-area { grid-column: 1; grid-row: 1; }
.view-cadet .index-panel { grid-column: 2; grid-row: 1 / 3; }
.view-cadet .chat-area { grid-column: 1; grid-row: 2; }
.view-cadet .slide-area .slide {
  /* With chat row. Subtract:
     width: 240 + 16 + 16 = 272
     height: 48 + 56 + 160 (chat) + 16 + 16 = 296 */
  width: min(
    calc(100vw - 272px),
    calc((100vh - 296px) * 16 / 9)
  );
}
.chat-area {
  grid-column: 1;
  grid-row: 2;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}

/* Index title bar */
.index-title-bar {
  position: sticky;
  top: 0;
  background: var(--surface);
  padding: 14px 14px 12px;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  z-index: 2;
  box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset;
}

/* Index list */
.index-section {
  border-bottom: 1px solid var(--border);
}
.index-section:last-child { border-bottom: none; }
.index-header {
  padding: 11px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
  user-select: none;
}
.index-header:hover { background: var(--surface-hover); }
.index-header .chev {
  color: var(--text-muted);
  transition: transform 0.15s ease;
  font-size: 9px;
}
.index-section.open .chev { transform: rotate(90deg); }
.index-sub {
  display: none;
  padding: 2px 0 8px 0;
  background: rgba(0,0,0,0.2);
}
.index-section.open .index-sub { display: block; }
.index-sub-item {
  padding: 6px 14px 6px 32px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  position: relative;
}
.index-sub-item:before {
  content: '';
  position: absolute;
  left: 22px;
  top: 12px;
  width: 4px;
  height: 1px;
  background: var(--text-dim);
}
.index-sub-item:hover {
  background: var(--surface-hover);
  color: var(--text);
}

/* Chat */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.msg {
  font-size: 13px;
  line-height: 1.55;
  max-width: 85%;
}
.msg.user {
  align-self: flex-end;
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 9px 13px;
  border-radius: 12px 12px 3px 12px;
  color: var(--text);
}
.msg.ai .label {
  font-size: 10.5px;
  color: var(--text-muted);
  margin-bottom: 5px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 500;
}
.msg.ai .body { color: var(--text); }

.chat-input-row {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--surface-2);
}
.chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  resize: none;
  min-height: 36px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.15s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}
.chat-input:focus { border-color: var(--border-strong); }
.chat-input::placeholder { color: var(--text-dim); }
.chat-send {
  background: var(--surface-hover);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 0 16px;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12.5px;
  font-family: inherit;
  font-weight: 500;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.chat-send:hover { background: #2a2a2a; }
.chat-send:active { background: #1f1f1f; }

/* ============ BOTTOM CONTROLS ============ */
.controls {
  height: 56px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--surface);
  flex-shrink: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}
.view-toggle {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
}
.view-toggle button {
  background: transparent;
  border: none;
  color: var(--text-muted);
  padding: 6px 14px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.15s;
  letter-spacing: 0.2px;
}
.view-toggle button:hover { color: var(--text); }
.view-toggle button.active {
  background: var(--surface-hover);
  color: var(--text);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 1px 3px rgba(0,0,0,0.4);
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-btn {
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  color: var(--text);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.nav-btn:hover { background: var(--surface-hover); }
.nav-btn:active { background: #1a1a1a; }
.nav-btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
}
.slide-counter {
  font-size: 12px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  min-width: 70px;
  text-align: center;
  letter-spacing: 0.3px;
}
.slide-counter .current {
  color: var(--text);
  font-weight: 500;
}

.right-cluster {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 140px;
  justify-content: flex-end;
}
.kbd-hint {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.3px;
}

/* Download button + dropdown */
.right-cluster {
  position: relative;
}
.download-wrap {
  position: relative;
}
.download-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 0 12px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 500;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.download-btn:hover { background: var(--surface-hover); }
.download-btn.open { background: var(--surface-hover); border-color: #444; }
.download-btn .dl-arrow {
  font-size: 13px;
  color: var(--text-muted);
}
.download-btn .dl-chev {
  font-size: 9px;
  color: var(--text-muted);
  margin-left: 2px;
}
.download-menu {
  position: absolute;
  bottom: calc(100% + 8px);
  right: 0;
  width: 240px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 12px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 8px 32px rgba(0,0,0,0.6),
    0 2px 8px rgba(0,0,0,0.4);
  z-index: 100;
}
.dl-section { display: flex; flex-direction: column; gap: 2px; }
.dl-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
  padding-left: 2px;
}
.dl-option {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 6px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--text);
}
.dl-option:hover { background: var(--surface-hover); }
.dl-option input[type=radio] {
  appearance: none;
  -webkit-appearance: none;
  width: 13px;
  height: 13px;
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  background: var(--bg);
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}
.dl-option input[type=radio]:checked {
  border-color: var(--accent);
}
.dl-option input[type=radio]:checked:after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  background: var(--accent);
}
.dl-range-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px 6px 30px;
}
.dl-range-row input[type=number] {
  width: 50px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 6px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 12px;
  outline: none;
  font-variant-numeric: tabular-nums;
}
.dl-range-row input[type=number]:focus { border-color: var(--border-strong); }
.dl-range-row input[type=number]:disabled { opacity: 0.35; cursor: not-allowed; }
.dl-range-row .dl-to {
  font-size: 11px;
  color: var(--text-muted);
}
.dl-divider {
  height: 1px;
  background: var(--border);
  margin: 10px -12px;
}
.dl-go {
  width: 100%;
  margin-top: 10px;
  background: var(--surface-hover);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12.5px;
  font-family: inherit;
  font-weight: 500;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.dl-go:hover { background: #2a2a2a; }
.dl-go:active { background: #1f1f1f; }

/* Toast */
.dl-toast {
  position: fixed;
  bottom: 76px;
  right: 16px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 12px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 8px 24px rgba(0,0,0,0.5);
  z-index: 200;
  animation: toast-in 0.2s ease;
}
@keyframes toast-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">

function darken(hex, amt = 35) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16) - amt);
  const g = Math.max(0, parseInt(hex.slice(3,5),16) - amt);
  const b = Math.max(0, parseInt(hex.slice(5,7),16) - amt);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function renderSlide(slide, scale = 1) {
  // Slides are 1920x1080 HTML files. The .slide wrapper enforces 16:9. The
  // iframe loads the slide at native size and we scale it via CSS transform so
  // chrome (text, charts, citation [n] markers) stays crisp at any viewport.
  // The slide URL carries ?chrome=off so _chrome.js suppresses the slide's
  // own logos and footer (the viewer topbar provides equivalent chrome).
  return `
    <div class="slide" style="background: #000; position: relative; overflow: hidden;">
      <iframe
        src="${slide.src}"
        loading="lazy"
        style="position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; border: 0; transform-origin: top left;"
        data-slide-iframe="${slide.num}">
      </iframe>
    </div>
  `;
}

// Scale every slide iframe so its native 1920x1080 fits its .slide container.
function scaleSlideIframes() {
  document.querySelectorAll('iframe[data-slide-iframe]').forEach(f => {
    const parent = f.parentElement;
    if (!parent) return;
    const w = parent.clientWidth;
    const h = parent.clientHeight;
    if (!w || !h) return;
    const scale = Math.min(w / 1920, h / 1080);
    f.style.transform = `scale(${scale})`;
  });
}
// Re-scale after every render, after iframe load, and on resize.
window.addEventListener('resize', scaleSlideIframes);
document.addEventListener('load', e => {
  if (e.target && e.target.matches && e.target.matches('iframe[data-slide-iframe]')) scaleSlideIframes();
}, true);

// ============ VIEW RENDERERS ============
function renderPresentView() {
  viewport.className = 'viewport view-present';
  viewport.innerHTML = `
    <div class="slide-frame">
      ${renderSlide(slideData[state.currentSlide])}
    </div>
  `;
}

function renderGridView() {
  viewport.className = 'viewport view-grid';
  const pageSize = 12;
  const page = Math.floor(state.currentSlide / pageSize);
  const start = page * pageSize;
  const end = Math.min(start + pageSize, slideData.length);
  const items = slideData.slice(start, end);

  viewport.innerHTML = `
    <div class="grid-container">
      ${items.map((s, i) => `
        <div class="grid-item ${start + i === state.currentSlide ? 'active' : ''}" data-slide="${start + i}">
          <div class="slide-frame">
            ${renderSlide(s, 0.35)}
          </div>
          <div class="grid-label">
            <span class="num">${String(s.num).padStart(2,'0')}</span>
            <span>${s.title}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  viewport.querySelectorAll('.grid-item').forEach(el => {
    el.addEventListener('click', () => {
      state.currentSlide = parseInt(el.dataset.slide);
      updateCounter();
      renderGridView();
    });
  });
}

function renderIndexView() {
  viewport.className = 'viewport view-index';
  viewport.innerHTML = `
    <div class="slide-area">
      <div class="slide-frame">
        ${renderSlide(slideData[state.currentSlide], 0.9)}
      </div>
    </div>
    <div class="index-panel">
      <div class="index-title-bar">Content Index</div>
      ${indexData.map((sec, i) => `
        <div class="index-section ${i === 0 ? 'open' : ''}">
          <div class="index-header">
            <span>${sec.title}</span>
            <span class="chev">▶</span>
          </div>
          <div class="index-sub">
            ${sec.subs.map(sub => `<div class="index-sub-item" data-slide="${sub.slide}">${sub.label}</div>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;

  viewport.querySelectorAll('.index-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });
  wireIndexSubClicks(viewport);
}

function renderCadetView() {
  viewport.className = 'viewport view-cadet';
  viewport.innerHTML = `
    <div class="slide-area">
      <div class="slide-frame">
        ${renderSlide(slideData[state.currentSlide], 0.55)}
      </div>
    </div>
    <div class="index-panel" id="index-panel">
      <div class="index-title-bar">Content Index</div>
      ${indexData.map((sec, i) => `
        <div class="index-section ${i === 0 ? 'open' : ''}">
          <div class="index-header">
            <span>${sec.title}</span>
            <span class="chev">▶</span>
          </div>
          <div class="index-sub">
            ${sec.subs.map(sub => `<div class="index-sub-item" data-slide="${sub.slide}">${sub.label}</div>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    <div class="chat-area">
      <div class="chat-messages" id="chat-messages">
        <div class="msg ai">
          <div class="label">Cadet</div>
          <div class="body">Report loaded. Ask about any section, request comparisons across slides, or jump to a topic.</div>
        </div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Ask Cadet about this report..." rows="1"></textarea>
        <button class="chat-send" id="chat-send">Send</button>
      </div>
    </div>
  `;

  // Index expand/collapse
  viewport.querySelectorAll('.index-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });
  wireIndexSubClicks(viewport);

  // Chat (mock)
  const input = document.getElementById('chat-input');
  const send = document.getElementById('chat-send');
  const messages = document.getElementById('chat-messages');

  function appendMsg(role, text) {
    const m = document.createElement('div');
    m.className = 'msg ' + role;
    if (role === 'ai') {
      m.innerHTML = `<div class="label">Cadet</div><div class="body">${text}</div>`;
    } else {
      m.textContent = text;
    }
    messages.appendChild(m);
    messages.scrollTop = messages.scrollHeight;
  }

  function sendMsg() {
    const text = input.value.trim();
    if (!text) return;
    appendMsg('user', text);
    input.value = '';
    setTimeout(() => {
      appendMsg('ai', 'Demo only. Wire this textarea to your AI backend to get real answers about the report.');
    }, 500);
  }

  send.addEventListener('click', sendMsg);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
}

// Wire click handlers on every .index-sub-item that carries a data-slide
// attribute. Clicking jumps the viewer to that slide and re-renders.
function wireIndexSubClicks(root) {
  root.querySelectorAll('.index-sub-item[data-slide]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const target = parseInt(el.dataset.slide, 10);
      if (Number.isFinite(target) && target >= 1 && target <= slideData.length) {
        state.currentSlide = target - 1;
        render();
      }
    });
  });
}

function render() {
  document.querySelector('.app').dataset.view = state.view;
  if (state.view === 'present') renderPresentView();
  else if (state.view === 'grid') renderGridView();
  else if (state.view === 'cadet') renderCadetView();
  else renderIndexView();
  updateCounter();
  // Slide iframes need scaling after each mount; defer one frame so the DOM
  // has laid out the new .slide containers and their computed widths.
  requestAnimationFrame(scaleSlideIframes);
}

function updateCounter() {
  document.getElementById('current').textContent = state.currentSlide + 1;
  document.getElementById('total').textContent = slideData.length;
  document.getElementById('prev').disabled = state.currentSlide === 0;
  document.getElementById('next').disabled = state.currentSlide === slideData.length - 1;
}

// ============ EVENT WIRING ============
// Centralised view switch (used by buttons + keyboard + fullscreenchange)
function switchView(newView) {
  const oldView = state.view;
  if (oldView === newView) return;
  if (oldView === 'present') teardownPresentMode();
  if (newView === 'present') setupPresentMode();
  state.view = newView;
  document.querySelectorAll('#view-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === newView);
  });
  render();
}

document.querySelectorAll('#view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

// === Present mode: real fullscreen + auto-hiding controls ===
let presentHideTimer = null;
function showPresentControls() {
  document.querySelector('.app').dataset.presentUi = 'show';
  clearTimeout(presentHideTimer);
  presentHideTimer = setTimeout(hidePresentControls, 2500);
}
function hidePresentControls() {
  document.querySelector('.app').dataset.presentUi = 'hidden';
}
function presentMouseMove(e) {
  // Show when mouse drifts into the bottom 120px of the screen
  if (window.innerHeight - e.clientY < 120) showPresentControls();
}
function setupPresentMode() {
  document.addEventListener('mousemove', presentMouseMove);
  showPresentControls(); // brief flash on entry so user discovers the bar
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}
function teardownPresentMode() {
  document.removeEventListener('mousemove', presentMouseMove);
  clearTimeout(presentHideTimer);
  delete document.querySelector('.app').dataset.presentUi;
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
}
// ESC returns to Index from Present mode (the default landing view)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.view === 'present') {
    switchView('index');
    e.preventDefault();
  }
});
// If user exits fullscreen via browser chrome or F11, drop back to Index
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && state.view === 'present') {
    switchView('index');
  }
});

document.getElementById('prev').addEventListener('click', () => {
  if (state.currentSlide > 0) { state.currentSlide--; render(); }
});
document.getElementById('next').addEventListener('click', () => {
  if (state.currentSlide < slideData.length - 1) { state.currentSlide++; render(); }
});

document.addEventListener('keydown', e => {
  if (e.target.matches('textarea, input')) return;
  if (e.key === 'ArrowLeft' && state.currentSlide > 0) { state.currentSlide--; render(); }
  else if (e.key === 'ArrowRight' && state.currentSlide < slideData.length - 1) { state.currentSlide++; render(); }
});

// ============ DOWNLOAD DROPDOWN ============
const dlBtn = document.getElementById('download-btn');
const dlMenu = document.getElementById('download-menu');
const dlFrom = document.getElementById('dl-from');
const dlTo = document.getElementById('dl-to-input');
const dlGo = document.getElementById('dl-go');
const dlToast = document.getElementById('dl-toast');

dlFrom.max = slideData.length;
dlTo.max = slideData.length;
dlTo.value = slideData.length;

function setMenuOpen(open) {
  dlMenu.hidden = !open;
  dlBtn.classList.toggle('open', open);
}

dlBtn.addEventListener('click', e => {
  e.stopPropagation();
  setMenuOpen(dlMenu.hidden);
});

document.addEventListener('click', e => {
  if (!dlMenu.contains(e.target) && e.target !== dlBtn && !dlBtn.contains(e.target)) {
    setMenuOpen(false);
  }
});

document.querySelectorAll('input[name=scope]').forEach(r => {
  r.addEventListener('change', () => {
    const isRange = document.querySelector('input[name=scope]:checked').value === 'range';
    dlFrom.disabled = !isRange;
    dlTo.disabled = !isRange;
  });
});

function showToast(msg) {
  dlToast.textContent = msg;
  dlToast.hidden = false;
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { dlToast.hidden = true; }, 2800);
}

function getSelectedSlides() {
  const scope = document.querySelector('input[name=scope]:checked').value;
  if (scope === 'current') return [state.currentSlide];
  if (scope === 'all') return slideData.map((_, i) => i);
  const from = Math.max(1, parseInt(dlFrom.value) || 1);
  const to = Math.min(slideData.length, parseInt(dlTo.value) || slideData.length);
  const lo = Math.min(from, to), hi = Math.max(from, to);
  const out = [];
  for (let i = lo - 1; i <= hi - 1; i++) out.push(i);
  return out;
}

function exportMarkdown(indices) {
  const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  const lines = [
    `# ${REPORT.subtitle}, ${REPORT.client}`,
    `Prepared for ${REPORT.agency}`,
    '',
    '## Slides',
    '',
  ];
  indices.forEach(i => {
    const s = slideData[i];
    lines.push(`### ${String(s.num).padStart(2,'0')}. ${s.title}`);
    lines.push('');
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${slug(REPORT.client)}-${slug(REPORT.subtitle)}-${Date.now()}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

dlGo.addEventListener('click', () => {
  const format = document.querySelector('input[name=format]:checked').value;
  const indices = getSelectedSlides();
  const count = indices.length;
  setMenuOpen(false);

  if (format === 'md') {
    exportMarkdown(indices);
    showToast(`Exported ${count} slide${count === 1 ? '' : 's'} as Markdown`);
  } else {
    showToast(`${format.toUpperCase()} export: ${count} slide${count === 1 ? '' : 's'} queued. Wire export endpoint to enable.`);
    console.log('[download]', { format, scope: document.querySelector('input[name=scope]:checked').value, indices });
  }
});

initReport();
render();
</script>
