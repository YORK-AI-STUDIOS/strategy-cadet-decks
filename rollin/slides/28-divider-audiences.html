<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Part 03 Divider — The Audiences</title>
<link rel="stylesheet" href="slide-base.css">
<style>
  .divider .sc-numeral {
    position: absolute;
    left: 80px; top: -40px;
    font: 800 920px/0.85 var(--font-sans);
    color: var(--fg-on-dark);
    letter-spacing: -0.05em;
    z-index: 2;
  }
  .divider .sc-toc { position: absolute; right: 120px; top: 260px; width: 640px; }
  .divider .sc-toc .lbl-row { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
  .divider .sc-toc .lbl-row .ln { width: 56px; height: 2px; background: var(--fg-on-dark); }
  .divider .sc-toc .sc-h2 { color: var(--fg-on-dark); margin: 0 0 8px; font: 700 48px/1.05 var(--font-sans); letter-spacing: -0.01em; }
  .divider .sc-toc .sc-sub { font: 400 18px/1.4 var(--font-sans); color: var(--fg-on-dark-2); margin-bottom: 28px; max-width: 580px; }
  .divider .sc-toc ul { list-style: none; padding: 0; margin: 0; border-top: 1px solid var(--fg-on-dark-3); }
  .divider .sc-toc li {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--fg-on-dark-3);
    align-items: baseline;
  }
  .divider .sc-toc li .pg { font: 600 13px/1 var(--font-sans); color: var(--fg-on-dark-2); }
  .divider .sc-toc li .nm { font: 600 13px/1.3 var(--font-sans); color: var(--fg-on-dark); letter-spacing: 0.08em; text-transform: uppercase; }
  .divider .divider-prepared { position: absolute; right: 120px; bottom: 96px; text-align: right; z-index: 3; }
  .divider .divider-prepared .dp-lbl { font: 600 11px/1.3 var(--font-sans); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-on-dark-3); margin-bottom: 12px; }
  .divider .divider-prepared .dp-logo { width: 180px; display: inline-block; }
  .divider .divider-prepared .dp-logo img { width: 100%; height: auto; display: block; filter: brightness(0) invert(1); }
</style>
</head>
<body>
<div class="sc-stage">
<section class="sc-slide gradient divider" data-screen-label="28 Part 03 Divider">
  <img src="../assets/photography/melbourne-3.jpg" class="sc-cityscape" alt="">

  <div class="sc-numeral">03</div>

  <div class="sc-toc">
    <div class="lbl-row"><span class="ln"></span><span class="sc-eyebrow on-dark">Part three of five</span></div>
    <h2 class="sc-h2">The Audiences.</h2>
    <div class="sc-sub">Three target cohorts for ROLLiN&rsquo;, profiled by demographics, cultural signals, purchase drivers and the moments they enter the category.</div>
    <ul>
      <li><span class="pg">p. 34</span><span class="nm">Audience 1  &middot;  first-car drivers</span></li>
      <li><span class="pg">p. 38</span><span class="nm">Audience 2  &middot;  urban renters</span></li>
      <li><span class="pg">p. 42</span><span class="nm">Audience 3  &middot;  gig workers</span></li>
    </ul>
  </div>


  <div class="divider-prepared">
    <div class="dp-lbl">Prepared for</div>
    <div class="dp-logo"><img src="../assets/logos/Media-Republic-logo.svg" alt="Media Republic"></div>
  </div>
</section>
</div>
