<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cover — Strategy Cadet</title>
<link rel="stylesheet" href="slide-base.css">
<style>
  .cover .sc-stack-eyebrow { position: absolute; top: 200px; left: 120px; display: flex; align-items: center; gap: 14px; }
  .cover .sc-stack-eyebrow .ln { width: 56px; height: 2px; background: var(--fg-on-dark-2); }
  .cover .sc-title { position: absolute; top: 248px; left: 120px; max-width: 1320px; }
  .cover .sc-title h1 { margin: 0; font: var(--t-h1); color: var(--fg-on-dark); letter-spacing: -0.025em; }
  .cover .sc-title .sub { margin-top: 24px; font: 400 26px/1.3 var(--font-sans); color: var(--fg-on-dark-2); }
  .cover .sc-meta { position: absolute; bottom: 200px; left: 120px; display: flex; gap: 80px; }
  .cover .sc-meta .col .lbl { font: var(--t-eyebrow); color: var(--fg-on-dark-3); margin-bottom: 8px; }
  .cover .sc-meta .col .val { font: 600 18px/1.3 var(--font-sans); color: var(--fg-on-dark); }
  /* On cover, both logos at same right edge (28px) + same width (220px) for clean vertical alignment. */
  .cover .sc-prepared { position: absolute; bottom: 100px; right: 28px; text-align: right; }
  .cover .sc-prepared .lbl { font: var(--t-eyebrow); color: var(--fg-on-dark-3); margin-bottom: 14px; }
  .cover .sc-prepared .mr-logo { width: 220px; height: auto; display: inline-block; }
  .cover .sc-prepared .mr-logo img { width: 100%; height: auto; display: block; filter: brightness(0) invert(1); }
  /* Override global chrome-cadet on cover only: bigger logo for visual mass, same right edge as MR. */
  .cover .sc-chrome-cadet { top: 60px; right: 28px; height: auto; }
  .cover .sc-chrome-cadet img { width: 220px; height: auto; }
</style>
</head>
<body>
<div class="sc-stage">
<section class="sc-slide gradient cover" data-screen-label="01 Cover">
  <img src="../assets/photography/melbourne-1.jpg" class="sc-cityscape" alt="">

  <div class="sc-stack-eyebrow">
    <span class="ln"></span>
    <span class="sc-eyebrow on-dark">Strategy Cadet  ·  Discovery Report</span>
  </div>

  <div class="sc-title">
    <h1>ROLLiN&rsquo; Insurance.<br>A digital challenger,<br>structurally at risk.</h1>
    <div class="sub">Digital Car Insurance  ·  Australia  ·  May 2026</div>
  </div>

  <div class="sc-meta">
    <div class="col">
      <div class="lbl">Category</div>
      <div class="val">Digital car insurance</div>
    </div>
    <div class="col">
      <div class="lbl">Market</div>
      <div class="val">Australia</div>
    </div>
    <div class="col">
      <div class="lbl">Method</div>
      <div class="val">Strategy Cadet v1.2  ·  4-agent</div>
    </div>
    <div class="col">
      <div class="lbl">Length</div>
      <div class="val">80 sections  ·  109 citations</div>
    </div>
  </div>

  <div class="sc-prepared">
    <div class="lbl">Prepared for</div>
    <div class="mr-logo"><img src="../assets/logos/Media-Republic-logo.svg" alt="Media Republic"></div>
  </div>

</section>
</div>
<script src="_scale.js"></script>
<script src="_chrome.js"></script>
</body>
</html>
